name: Build and publish

on:
    workflow_dispatch:

jobs:

    build-win: # cpu/vulkan
        runs-on: windows-latest
        strategy:
            matrix:
                include:
                    -   name: win-x64
                        ggml_cuda: OFF
                        ggml_vulkan: OFF
                    -   name: win-x64-cuda
                        ggml_cuda: ON
                        ggml_vulkan: OFF
                    -   name: win-x64-vulkan
                        ggml_cuda: OFF
                        ggml_vulkan: ON
        env:
            GGML_CUDA: ${{ matrix.ggml_cuda }}
            GGML_VULKAN: ${{ matrix.ggml_vulkan }}

        steps:
            -   uses: actions/checkout@v6

            -   uses: actions/setup-java@v5
                with:
                    distribution: 'temurin'
                    java-version: '21'

            -   name: Install Vulkan SDK
                uses: jakoch/install-vulkan-sdk-action@v1
                if: matrix.ggml_vulkan == 'ON'
                with:
                    vulkan_version: 1.4.304.1
                    install_runtime: true

            -   uses: Jimver/cuda-toolkit@v0.2.30
                if: matrix.ggml_cuda == 'ON'
                id: cuda-toolkit
                with:
                    cuda: '12.4.0'

            -   name: Download models      # cpu/vulkan, for test
                if: matrix.ggml_cuda == 'OFF'
                shell: powershell
                run: |
                    Invoke-WebRequest -Uri https://huggingface.co/Jaffe2718/Qwen3-ASR-GGUF/resolve/main/qwen3-asr-0.6b-q8_0.gguf?download=true -OutFile qwen3-asr-0.6b-q8_0.gguf
                    Invoke-WebRequest -Uri https://huggingface.co/Jaffe2718/Qwen3-ASR-GGUF/resolve/main/qwen3-forcedaligner-0.6b-f16.gguf?download=true -OutFile qwen3-forcedaligner-0.6b-f16.gguf
                    Invoke-WebRequest -Uri https://huggingface.co/Jaffe2718/Qwen3-ASR-GGUF/resolve/main/qwen3-asr-1.7b-q4_1.gguf?download=true -OutFile qwen3-asr-1.7b-q4_1.gguf

            -   name: Compile
                shell: powershell
                run: |
                    ./gradlew compileCpp

            -   name: Test                   # cpu/vulkan
                if: matrix.ggml_cuda == 'OFF'
                shell: powershell
                run: |
                    ./gradlew test

            -   name: Publish test report
                uses: mikepenz/action-junit-report@v5
                if: matrix.ggml_cuda == 'OFF' && (success() || failure())
                with:
                    report_paths: '**/build/test-results/**/*.xml'

            -   name: Clean up models
                if: matrix.ggml_cuda == 'OFF'
                shell: powershell
                run: |
                    Remove-Item qwen3-*.gguf -Force -ErrorAction SilentlyContinue

            -   name: Add CUDA dlls
                if: matrix.ggml_cuda == 'ON'
                shell: powershell
                run: |
                    Invoke-WebRequest -Uri https://github.com/ggml-org/llama.cpp/releases/download/b8368/cudart-llama-bin-win-cuda-12.4-x64.zip -OutFile cudart-llama-bin-win-cuda-12.4-x64.zip
                    Expand-Archive -Path cudart-llama-bin-win-cuda-12.4-x64.zip -DestinationPath ${{ matrix.name }}
                    Remove-Item cudart-llama-bin-win-cuda-12.4-x64.zip -Force

            -   name: Upload CPU natives
                if: matrix.ggml_cuda == 'OFF' && matrix.ggml_vulkan == 'OFF'
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ matrix.name }}-natives
                    path: src/main/resources/${{ matrix.name }}/*

            -   name: Upload CUDA natives
                if: matrix.ggml_cuda == 'ON'
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ matrix.name }}-natives
                    path: ${{ matrix.name }}/*

            -   name: Upload Vulkan natives
                if: matrix.ggml_vulkan == 'ON'
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ matrix.name }}-natives
                    path: ${{ matrix.name }}/*


    build-linux: # cpu/cuda/vulkan
        strategy:
            matrix:
                include:
                    -   name: linux-x64
                        runner: ubuntu-22.04
                        ggml_cuda: OFF
                        ggml_vulkan: OFF
                    -   name: linux-x64-cuda
                        runner: ubuntu-22.04
                        ggml_cuda: ON
                        ggml_vulkan: OFF
                    -   name: linux-x64-vulkan
                        runner: ubuntu-22.04
                        ggml_cuda: OFF
                        ggml_vulkan: ON
                    -   name: linux-arm64
                        runner: ubuntu-22.04-arm
                        ggml_cuda: OFF
                        ggml_vulkan: OFF
                    -   name: linux-arm64-vulkan
                        runner: ubuntu-22.04-arm
                        ggml_cuda: OFF
                        ggml_vulkan: ON
        runs-on: ${{ matrix.runner }}
        env:
            GGML_CUDA: ${{ matrix.ggml_cuda }}
            GGML_VULKAN: ${{ matrix.ggml_vulkan }}
        steps:
            -   uses: actions/checkout@v6

            -   uses: jlumbroso/free-disk-space@main
                with:
                    tool-cache: false
                    android: true
                    dotnet: true
                    haskell: true
                    docker-images: true

            -   uses: actions/setup-java@v5
                with:
                    distribution: 'temurin'
                    java-version: '21'

            -   uses: Jimver/cuda-toolkit@v0.2.30
                if: matrix.ggml_cuda == 'ON'
                id: cuda-toolkit
                with:
                    cuda: '12.4.0'

            -   name: Install Vulkan Tools
                # Install Glslang because Vulkan doesn't bundle it for Ubuntu
                if: matrix.ggml_vulkan == 'ON'
                run: |
                    sudo apt update
                    sudo apt install -y vulkan-tools glslang-tools
                    sudo apt-get install -y libvulkan1 mesa-vulkan-drivers
                    sudo vulkaninfo

            -   name: Build shaderc
                if: matrix.ggml_vulkan == 'ON'
                run: |
                    # Set up shaderc source directory and build directory
                    SOURCE_DIR=$PWD/shaderc
                    BUILD_DIR=$PWD/shaderc_build
                    
                    # Clone shaderc repository
                    git clone https://github.com/google/shaderc $SOURCE_DIR
                    cd $SOURCE_DIR
                    ./utils/git-sync-deps  # This fetches the dependencies
                    
                    # Create a separate build directory
                    mkdir $BUILD_DIR
                    cd $BUILD_DIR
                    
                    # Build shaderc using CMake and Ninja
                    cmake -GNinja -DCMAKE_BUILD_TYPE=Release $SOURCE_DIR
                    ninja
                    
                    # Optionally run tests
                    # ctest
                    
                    # Move glslc to a directory in PATH
                    sudo mv glslc/glslc /usr/local/bin/

            -   name: Prepare Vulkan SDK
                uses: humbletim/setup-vulkan-sdk@v1.2.1
                if: matrix.ggml_vulkan == 'ON'
                with:
                    vulkan-query-version: 1.4.304.1
                    vulkan-components: Vulkan-Headers, Vulkan-Loader
                    vulkan-use-cache: true

            -   name: Download models      # cpu/vulkan, for test
                if: matrix.ggml_cuda == 'OFF'
                run: |
                    curl -L -o qwen3-asr-0.6b-q8_0.gguf https://huggingface.co/Jaffe2718/Qwen3-ASR-GGUF/resolve/main/qwen3-asr-0.6b-q8_0.gguf?download=true
                    curl -L -o qwen3-forcedaligner-0.6b-f16.gguf https://huggingface.co/Jaffe2718/Qwen3-ASR-GGUF/resolve/main/qwen3-forcedaligner-0.6b-f16.gguf?download=true
                    curl -L -o qwen3-asr-1.7b-q4_1.gguf https://huggingface.co/Jaffe2718/Qwen3-ASR-GGUF/resolve/main/qwen3-asr-1.7b-q4_1.gguf?download=true

            -   name: Compile
                run: |
                    chmod +x ./gradlew
                    ./gradlew compileCpp

            -   name: Test
                if: matrix.ggml_cuda == 'OFF'
                run: |
                    ./gradlew test

            -   name: Publish test report
                uses: mikepenz/action-junit-report@v5
                if: matrix.ggml_cuda == 'OFF' && (success() || failure())
                with:
                    report_paths: '**/build/test-results/**/*.xml'

            -   name: Clean up models
                if: matrix.ggml_cuda == 'OFF'
                run: |
                    rm -rf qwen3-*.gguf

            -   name: Upload CPU natives
                uses: actions/upload-artifact@v4
                if: matrix.ggml_cuda == 'OFF' && matrix.ggml_vulkan == 'OFF'
                with:
                    name: ${{ matrix.name }}-natives
                    path: src/main/resources/${{ matrix.name }}/*

            -   name: Upload CUDA natives
                uses: actions/upload-artifact@v4
                if: matrix.ggml_cuda == 'ON'
                with:
                    name: ${{ matrix.name }}-natives
                    path: ${{ matrix.name }}/*

            -   name: Upload Vulkan natives
                if: matrix.ggml_vulkan == 'ON'
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ matrix.name }}-natives
                    path: ${{ matrix.name }}/*


    build-mac:
        strategy:
            matrix:
                include:
                    -   name: mac-x64
                        runner: macos-14
                    -   name: mac-arm64
                        runner: macos-15-intel
        runs-on: ${{ matrix.runner }}
        steps:
            -   uses: actions/checkout@v6

            -   uses: actions/setup-java@v5
                with:
                     distribution: 'temurin'
                     java-version: '21'

            -   name: Download models      # for test
                run: |
                    curl -L -o qwen3-asr-0.6b-q8_0.gguf https://huggingface.co/Jaffe2718/Qwen3-ASR-GGUF/resolve/main/qwen3-asr-0.6b-q8_0.gguf?download=true
                    curl -L -o qwen3-forcedaligner-0.6b-f16.gguf https://huggingface.co/Jaffe2718/Qwen3-ASR-GGUF/resolve/main/qwen3-forcedaligner-0.6b-f16.gguf?download=true
                    curl -L -o qwen3-asr-1.7b-q4_1.gguf https://huggingface.co/Jaffe2718/Qwen3-ASR-GGUF/resolve/main/qwen3-asr-1.7b-q4_1.gguf?download=true

            -   name: Compile
                run: |
                    chmod +x ./gradlew
                    ./gradlew compileCpp

            -   name: Test
                run: |
                    ./gradlew test

            -   name: Publish test report
                uses: mikepenz/action-junit-report@v5
                if: success() || failure()
                with:
                    report_paths: '**/build/test-results/**/*.xml'

            -   name: Clean up models
                run: |
                    rm -rf qwen3-*.gguf

            -   name: Upload Mac natives
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ matrix.name }}-natives
                    path: src/main/resources/${{ matrix.name }}/*


    publish:
        needs: [ build-win, build-linux, build-mac]
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v6

            -   uses: jlumbroso/free-disk-space@main
                with:
                    tool-cache: false
                    android: true
                    dotnet: true
                    haskell: true
                    docker-images: true

            -   uses: actions/setup-java@v5
                with:
                    distribution: 'temurin'
                    java-version: '21'

            -   uses: actions/download-artifact@v4
                with:
                    name: linux-x64-natives
                    path: src/main/resources/linux-x64/

            -   uses: actions/download-artifact@v4
                with:
                    name: linux-arm64-natives
                    path: src/main/resources/linux-arm64/

            -   uses: actions/download-artifact@v4
                with:
                    name: mac-x64-natives
                    path: src/main/resources/mac-x64/

            -   uses: actions/download-artifact@v4
                with:
                    name: mac-arm64-natives
                    path: src/main/resources/mac-arm64/

            -   uses: actions/download-artifact@v4
                with:
                    name: win-x64-natives
                    path: src/main/resources/win-x64/

            -   uses: actions/download-artifact@v4
                with:
                    name: linux-x64-cuda-natives
                    path: linux-x64-cuda/

            -   uses: actions/download-artifact@v4
                with:
                    name: linux-x64-vulkan-natives
                    path: linux-x64-vulkan/

            -   uses: actions/download-artifact@v4
                with:
                    name: linux-arm64-vulkan-natives
                    path: linux-arm64-vulkan/

            -   uses: actions/download-artifact@v4
                with:
                    name: win-x64-cuda-natives
                    path: win-x64-cuda/

            -   uses: actions/download-artifact@v4
                with:
                    name: win-x64-vulkan-natives
                    path: win-x64-vulkan/

            -   name: Build JAR and zips for release
                run: |
                    chmod +x ./gradlew
                    ./gradlew clean build publish --stacktrace -x test
                    ./gradlew prepareZipsForRelease

            -   name: Publish to maven central
                run: ./gradlew jreleaserDeploy --stacktrace
                env:
                    JRELEASER_MAVENCENTRAL_STAGE: UPLOAD # why the hell doesn't publish work
                    JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
                    JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_PASSWORD }}
                    JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
                    JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
                    JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}

            -   id: set_tag_name
                run: |
                    echo "tag_name=v$(sed -n 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*\(.*\)[[:space:]]*$/\1/p' gradle.properties)" >> $GITHUB_OUTPUT

            -   uses: softprops/action-gh-release@v2
                with:
                    draft: true
                    tag_name: ${{ steps.set_tag_name.outputs.tag_name }}
                    generate_release_notes: true
                    files: | 
                        release/*.zip
                        build/libs/*.jar
                env:
                    GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}